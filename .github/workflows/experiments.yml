name: Lakehouse Experiments

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_stack:
        description: Run Docker-based Spark/Trino experiment workflow
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.10"

jobs:
  metadata-experiments:
    name: Metadata experiment smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src scripts

      - name: Validate metadata YAML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path("metadata").glob("*.yaml")):
              with path.open("r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"validated {path}")
          PY

      - name: Run metadata discoverability experiment
        run: |
          mkdir -p results
          python -m src.experiments.exp1_metadata_discoverability \
            --config metadata/pipeline_config.yaml \
            --out results/exp1_metadata_discoverability.json

      - name: Upload metadata experiment results
        uses: actions/upload-artifact@v4
        with:
          name: metadata-experiment-results
          path: results/exp1_metadata_discoverability.json
          if-no-files-found: error

  full-stack-experiments:
    name: Full-stack experiment workflow
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_full_stack == true) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-full-stack]')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cp .env.example .env
          mkdir -p results/full_kappa_flow

      - name: Start lakehouse services
        run: |
          set -o pipefail
          docker compose -f docker-compose.ci.yml config
          docker compose -f docker-compose.ci.yml up -d 2>&1 | tee results/full_kappa_flow/compose_up.log

      - name: Wait for core services
        run: |
          for i in {1..60}; do
            docker compose -f docker-compose.ci.yml exec -T postgres-source pg_isready -U lakehouse -d source_db && break
            sleep 5
          done

          for i in {1..60}; do
            docker compose -f docker-compose.ci.yml exec -T kafka kafka-topics --bootstrap-server localhost:9092 --list && break
            sleep 5
          done

          docker compose -f docker-compose.ci.yml ps

      - name: Prepare Python dependencies in Spark container
        run: |
          docker compose -f docker-compose.ci.yml exec -T spark bash -lc \
            "cd /opt/lakehouse && python -m pip install --user -r requirements.txt"

      - name: Run full Source to Data Mart flow
        run: |
          docker compose -f docker-compose.ci.yml exec -T \
            -e TRINO_HOST=trino \
            -e TRINO_PORT=8080 \
            -e BATCH_RUN_ID=github_actions_${{ github.run_id }} \
            -e FLOW_RESULTS_DIR=results/full_kappa_flow \
            -e LAKEHOUSE_CATALOG_TYPE=hadoop \
            -e LAKEHOUSE_WAREHOUSE=file:///opt/lakehouse/warehouse \
            spark bash -lc "cd /opt/lakehouse && bash scripts/run_full_kappa_flow_experiment.sh"

      - name: Upload full-stack experiment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-experiment-results
          path: results/full_kappa_flow/
          if-no-files-found: warn

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --tail=200
