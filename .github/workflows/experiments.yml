name: Lakehouse Experiments

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_stack:
        description: Run Docker-based Spark/Trino experiment workflow
        required: false
        default: false
        type: boolean
      run_mdl_eg:
        description: Run the full MDL-EG docker-compose stack and SCALE=small experiments (thesis Chapter 4)
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.10"

jobs:
  metadata-experiments:
    name: Metadata experiment smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src scripts

      - name: Validate metadata YAML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path("metadata").glob("*.yaml")):
              with path.open("r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"validated {path}")
          PY

      - name: Run metadata discoverability experiment
        run: |
          mkdir -p results
          python -m src.experiments.exp1_metadata_discoverability \
            --config metadata/pipeline_config.yaml \
            --out results/exp1_metadata_discoverability.json

      - name: Upload metadata experiment results
        uses: actions/upload-artifact@v4
        with:
          name: metadata-experiment-results
          path: results/exp1_metadata_discoverability.json
          if-no-files-found: error

  full-stack-experiments:
    name: Full-stack experiment workflow
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_full_stack == true) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-full-stack]')) }}
    services:
      postgres-source:
        image: postgres:16
        env:
          POSTGRES_USER: lakehouse
          POSTGRES_PASSWORD: lakehouse
          POSTGRES_DB: source_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lakehouse -d source_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      kafka:
        image: bitnami/kafka:3.7
        env:
          ALLOW_PLAINTEXT_LISTENER: "yes"
          KAFKA_CFG_NODE_ID: 0
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python and Spark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyspark==3.5.1

      - name: Prepare CI configs and source schema
        run: |
          mkdir -p results/full_kappa_flow
          python - <<'PY'
          from pathlib import Path
          import psycopg2
          import yaml

          with psycopg2.connect("postgresql://lakehouse:lakehouse@localhost:5432/source_db") as conn:
              with conn.cursor() as cur:
                  cur.execute(Path("sql/01_source_schema.sql").read_text(encoding="utf-8"))
              conn.commit()

          out_dir = Path("results/full_kappa_flow")
          flows = yaml.safe_load(Path("metadata/kappa_flows.yaml").read_text(encoding="utf-8"))
          flows["connections"]["kafka_default"]["bootstrap_servers"] = "localhost:9092"
          flows["runtime"]["checkpoint_base"] = "file:///tmp/lakehouse/checkpoints/kappa"
          (out_dir / "ci_kappa_flows.yaml").write_text(yaml.safe_dump(flows, sort_keys=False), encoding="utf-8")

          batch = yaml.safe_load(Path("metadata/kappa_batch_sources.yaml").read_text(encoding="utf-8"))
          batch["connections"]["source_postgres"]["dsn"] = "postgresql://lakehouse:lakehouse@localhost:5432/source_db"
          batch["connections"]["kafka_default"]["bootstrap_servers"] = "localhost:9092"
          (out_dir / "ci_kappa_batch_sources.yaml").write_text(yaml.safe_dump(batch, sort_keys=False), encoding="utf-8")
          PY

      - name: Run full Source to Data Mart flow
        run: |
          SOURCE_DSN=postgresql://lakehouse:lakehouse@localhost:5432/source_db \
          KAPPA_CONFIG=results/full_kappa_flow/ci_kappa_flows.yaml \
          BATCH_CONFIG=results/full_kappa_flow/ci_kappa_batch_sources.yaml \
          BATCH_RUN_ID=github_actions_${{ github.run_id }} \
          FLOW_RESULTS_DIR=results/full_kappa_flow \
          LAKEHOUSE_CATALOG_TYPE=hadoop \
          LAKEHOUSE_WAREHOUSE=file://${{ github.workspace }}/warehouse \
          bash scripts/run_full_kappa_flow_experiment.sh

      - name: Upload full-stack experiment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-experiment-results
          path: results/full_kappa_flow/
          if-no-files-found: warn

      - name: Show service logs on failure
        if: failure()
        run: docker ps -a

  mdl-eg-full-stack:
    name: MDL-EG full stack (thesis Chapter 4, SCALE=small)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_mdl_eg == true) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-mdl-eg]')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Build and start the full stack
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Wait for OpenMetadata to become healthy
        run: |
          for i in $(seq 1 90); do
            status=$(docker inspect --format '{{.State.Health.Status}}' openmetadata 2>/dev/null || echo starting)
            echo "openmetadata: $status (attempt $i)"
            [ "$status" = "healthy" ] && exit 0
            sleep 10
          done
          echo "OpenMetadata did not become healthy in time"
          docker compose ps
          docker logs openmetadata-migrate 2>&1 | tail -50 || true
          docker logs openmetadata 2>&1 | tail -50 || true
          exit 1

      - name: Run streaming pipeline (reduced CI load)
        run: |
          docker compose exec -dT spark bash -lc \
            "cd /opt/lakehouse && timeout 420 spark-submit src/jobs/04_stream_events.py --config metadata/pipeline_config.yaml || true"
          sleep 90   # let the Structured Streaming query initialize
          docker compose exec -T spark bash -lc \
            "cd /opt/lakehouse && python scripts/produce_events.py --bootstrap kafka:29092 --rate 500 --duration 120"
          sleep 90   # let the consumer drain and commit
          docker compose exec -T spark bash -lc "pkill -f 04_stream_events || true"

      - name: Run SCALE=small end-to-end experiments
        run: |
          docker compose exec -T spark bash -lc \
            "cd /opt/lakehouse && SCALE=small bash scripts/run_all.sh" 2>&1 | tee run_small_log.txt
          mkdir -p results
          cp run_small_log.txt results/

      - name: Collect service state
        if: always()
        run: |
          mkdir -p results/service_logs
          docker compose ps > results/service_logs/compose_ps.txt || true
          for s in openmetadata spark trino hive-metastore debezium; do
            docker logs "$s" 2>&1 | tail -200 > "results/service_logs/${s}.log" || true
          done

      - name: Upload experiment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mdl-eg-small-results
          path: results/
          if-no-files-found: warn
