version: "3.8"

services:
  postgres-source:
    image: postgres:16
    container_name: postgres-source
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOURCE_DB}
    ports: ["5432:5432"]
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
    volumes:
      - pg_source:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  postgres-hms:
    image: postgres:16
    container_name: postgres-hms
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${HMS_DB}
    ports: ["5433:5432"]
    volumes:
      - pg_hms:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

  create-buckets:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      for b in lakehouse-raw lakehouse-work lakehouse-silver lakehouse-gold lakehouse-mart lakehouse-audit lakehouse-quarantine; do mc mb -p local/$$b || true; done;
      exit 0;"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  debezium:
    image: debezium/connect:2.6
    depends_on: [kafka, postgres-source]
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status

  hive-metastore:
    image: apache/hive:3.1.3
    depends_on: [postgres-hms, minio]
    ports: ["9083:9083"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hms:5432/${HMS_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=${MINIO_ROOT_USER}
        -Dfs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        -Dfs.s3a.path.style.access=true

  spark:
    image: bitnami/spark:3.5
    depends_on: [hive-metastore, minio, kafka]
    environment:
      SPARK_MODE: master
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports: ["7077:7077", "8080:8080"]
    volumes:
      - ./:/opt/lakehouse

  trino:
    image: trinodb/trino:446
    depends_on: [hive-metastore, minio]
    ports: ["8088:8080"]
    volumes:
      - ./trino/catalog:/etc/trino/catalog

volumes:
  pg_source:
  pg_hms:
  minio_data:
